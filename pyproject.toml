[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "landmine-screen"
version = "0.1.0"
description = "Tier 1 deterministic landmine screen for micro/small-cap equities (SEC EDGAR XBRL, point-in-time)"
requires-python = ">=3.10"
dependencies = ["PyYAML>=6.0"]

[project.optional-dependencies]
dev = ["pytest>=7"]

[project.scripts]
landmine = "landmine.cli:main"

[tool.setuptools.packages.find]
include = ["landmine*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
