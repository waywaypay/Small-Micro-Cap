# Tier 1 landmine-screen thresholds. All knobs live here so the engine itself
# stays free of magic numbers. Starter values per spec — calibrate freely.
#
# severity_bands map a rule's normalized "exceedance" (how far past the
# threshold, 0..inf) onto a severity label. Bands are [LOW, MEDIUM, HIGH,
# CRITICAL] lower-bounds on exceedance; severity_score is min(1, exceedance/cap).

data_source:
  # Declared SEC User-Agent for the production companyfacts path (unused on the
  # frozen-fixture path). SEC fair-access policy requires a contact email.
  user_agent: "Deerpark Research max@deerpark.io"

rules:
  R1_DILUTION:
    enabled: true
    # shares-outstanding YoY growth above this fraction flags dilution.
    yoy_growth_threshold: 0.25
    # ignore |EPS| below this when deriving shares = NetIncome / EPS (MCP path);
    # tiny EPS makes the derived share count unstable.
    min_abs_eps: 0.05
    # period_end spacing (days) that counts as "one year ago".
    yoy_window_days: [300, 430]
    # derived (NI/EPS) path only: if implied share count jumps more than this
    # multiple between consecutive periods, the estimate is too noisy to flag.
    max_consecutive_jump: 3.0
    # derived path is low-confidence; cap its severity_score so an estimate
    # never produces a high-severity flag.
    low_confidence_severity_cap: 0.5
    # don't flag heavy share growth in a cash-generative business (usually a
    # stock acquisition or stock-based comp, not dilution-to-fund-losses).
    require_negative_ocf: true
    severity_cap: 1.00          # +100% YoY -> score 1.0
    severity_bands: [0.25, 0.50, 1.00, 2.00]

  R2_CASH_RUNWAY:
    enabled: true
    # flag when runway < this many quarters AND operating cash flow < 0.
    min_runway_quarters: 4.0
    # average up to this many consecutive trailing quarters for the burn rate.
    burn_window_quarters: 4
    severity_cap: 4.0           # 0 quarters of runway -> score 1.0
    severity_bands: [0.0, 1.0, 2.0, 3.0]   # quarters of runway SHORTFALL

  R3_NEGATIVE_EQUITY:
    enabled: true
    # flag when total stockholders' equity < this (USD).
    equity_floor: 0.0
    # don't flag negative equity in a cash-generative business (buyback-driven
    # negative equity is a financing choice, not distress). Set false to flag
    # any negative equity regardless of cash generation.
    require_negative_ocf: true
    severity_cap: 1.0           # equity == -100% of |assets-scale| -> 1.0
    # bands on (-equity / total_assets); deeper negative = worse.
    severity_bands: [0.0, 0.10, 0.25, 0.50]

  R4_LIQUIDITY:
    enabled: true
    # flag when current ratio (current assets / current liabilities) < this.
    min_current_ratio: 1.0
    # don't flag a sub-1 current ratio in a cash-generative business (normal for
    # asset-light / float-funded firms). Set false to flag regardless.
    require_negative_ocf: true
    severity_cap: 1.0           # ratio 0 -> score 1.0
    severity_bands: [0.0, 0.15, 0.35, 0.60]  # bands on (threshold - ratio)

  R5_EARNINGS_QUALITY:
    enabled: true
    # flag when accruals ratio (NetIncome - OperatingCashFlow) / TotalAssets
    # exceeds this (aggressive, cash-poor earnings).
    max_accruals_ratio: 0.10
    # only flag high accruals when operating cash flow is negative (earnings not
    # backed by cash). Positive-OCF high accruals = working-capital build in a
    # cash-generating business, not a distress signal. Set false to flag either way.
    require_negative_ocf: true
    severity_cap: 0.40
    severity_bands: [0.10, 0.20, 0.30, 0.40]

  # --- Tier 2: deterministic event detection (rolls up with Tier 1) ----------
  T2_GOING_CONCERN:
    enabled: true
    # a going-concern opinion is "current" for ~one annual cycle.
    recency_days: 400
    severity: CRITICAL
    severity_score: 1.0
  T2_MATERIAL_WEAKNESS:
    enabled: true
    recency_days: 400
    severity: MEDIUM
    severity_score: 0.5
  T2_LATE_FILING:
    enabled: true
    # NT 10-K/10-Q within ~18 months is a high-precision distress signal.
    window_days: 540
    severity: HIGH
    severity_score: 0.7
  T2_RESTATEMENT:
    enabled: true               # 8-K Item 4.02 non-reliance
    recency_days: 730
    severity: HIGH
    severity_score: 0.8
  T2_AUDITOR_CHANGE:
    enabled: true               # 8-K Item 4.01
    recency_days: 540
    severity: MEDIUM
    severity_score: 0.5
  T2_DELISTING:
    enabled: true               # 8-K Item 3.01 listing-rule notice
    recency_days: 540
    severity: HIGH
    severity_score: 0.8
  T2_BANKRUPTCY:
    enabled: true               # 8-K Item 1.03
    recency_days: 730
    severity: CRITICAL
    severity_score: 1.0
  T2_DILUTION_EVENTS:
    enabled: true
    # flag a cluster of capital raises (shelf takedowns / 424B) in the window.
    window_days: 365
    min_count: 3
    severity_cap: 7.0           # min_count + 7 offerings -> score 1.0
    severity_bands: [0.0, 2.0, 4.0, 6.0]

scoring:
  # weight applied to each rule's severity_score in the rollup total.
  weights:
    R1_DILUTION: 1.0
    R2_CASH_RUNWAY: 1.5
    R3_NEGATIVE_EQUITY: 1.5
    R4_LIQUIDITY: 1.0
    R5_EARNINGS_QUALITY: 1.0
    T2_GOING_CONCERN: 2.0
    T2_MATERIAL_WEAKNESS: 1.0
    T2_RESTATEMENT: 1.5
    T2_AUDITOR_CHANGE: 1.0
    T2_DELISTING: 1.5
    T2_BANKRUPTCY: 2.0
    T2_LATE_FILING: 1.5
    T2_DILUTION_EVENTS: 1.0
