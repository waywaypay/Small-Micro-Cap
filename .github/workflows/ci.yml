name: CI

# The screen's value rests on two guarantees that only automation can hold:
# byte-identical determinism and point-in-time correctness. Both are encoded in
# the test suite (test_determinism / test_pit / test_golden), so pytest is the
# hard gate here. ruff is gated too; mypy runs advisory while the type
# annotations are cleaned up.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable + dev extras)
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check landmine landmine_api tests
      - name: Test (pytest)
        run: pytest -q
      - name: Type-check (mypy, advisory)
        run: mypy landmine landmine_api --ignore-missing-imports
        continue-on-error: true
