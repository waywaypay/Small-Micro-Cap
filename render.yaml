# Render Blueprint for the Landmine Screen API.
# Deploy: push this repo to GitHub, then in the Render dashboard pick
# "New +" -> "Blueprint" and select the repo. Render reads this file.
#
# Runs on a paid tier (Starter) rather than free for two reasons a wide sweep
# exposed: free instances spin down after ~15 min idle (killing a long screen
# and its in-memory progress mid-run), and free does not support a persistent
# disk. The disk below gives the companyfacts cache a home that survives
# restarts/redeploys, so a re-run after any interruption resumes from cache
# instead of re-fetching thousands of filings from SEC.
services:
  - type: web
    name: landmine-screen
    runtime: python
    plan: starter
    region: oregon
    branch: claude/upbeat-hamilton-7lFsZ
    buildCommand: "pip install -e ."
    startCommand: "uvicorn landmine_api.app:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: companyfacts-cache
      mountPath: /var/cache/landmine
      # companyfacts JSON is ~0.5-3 MB/filer; sized for a broad sweep's cache.
      sizeGB: 10
    envVars:
      # Generated by Render and injected; copy it from the dashboard to call
      # the protected endpoints via the X-Api-Key header.
      - key: API_KEY
        generateValue: true
      # SEC fair-access policy requires a descriptive UA with a contact email.
      # Set this to enable the live data.sec.gov path.
      - key: SEC_USER_AGENT
        sync: false
      # auto = companyfacts when SEC_USER_AGENT is set, else frozen fixtures.
      - key: LANDMINE_SOURCE
        value: auto
      - key: LANDMINE_ENABLE_EVENTS
        value: "1"
      # Largest universe a single /universe request will screen. Raised from
      # 250 so the full $50M-$2B micro/small-cap band (~2,649 names) is allowed.
      - key: LANDMINE_MAX_UNIVERSE
        value: "3000"
      # Fan-out width for per-name SEC fetches: overlaps the round-trips so a
      # wide sweep isn't strictly serial. Aggregate rate is still capped below.
      - key: LANDMINE_MAX_WORKERS
        value: "8"
      # Shared ceiling on SEC requests/second across all workers, kept under
      # SEC fair-access (10/s) so parallelism can't get the deploy IP throttled.
      - key: LANDMINE_SEC_RPS
        value: "8"
      # Persist the companyfacts cache on the mounted disk above.
      - key: LANDMINE_CACHE_DIR
        value: /var/cache/landmine
      - key: PYTHON_VERSION
        value: "3.11.9"
