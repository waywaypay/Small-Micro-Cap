# Render Blueprint for the Landmine Screen (free tier). Two services:
#   landmine-screen  — the FastAPI HTTP API (/run, /universe, /health)
#   landmine-mcp     — the remote MCP server (streamable HTTP) for Claude.ai
#                      custom connectors; wraps the API above
# Deploy: push this repo to GitHub, then in the Render dashboard pick
# "New +" -> "Blueprint" and select the repo. Render reads this file.
services:
  - type: web
    name: landmine-screen
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: "pip install -e ."
    startCommand: "uvicorn landmine_api.app:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Generated by Render and injected; copy it from the dashboard to call
      # the protected endpoints via the X-Api-Key header.
      - key: API_KEY
        generateValue: true
      # SEC fair-access policy requires a descriptive UA with a contact email.
      # Set this to enable the live data.sec.gov path.
      - key: SEC_USER_AGENT
        sync: false
      # auto = companyfacts when SEC_USER_AGENT is set, else frozen fixtures.
      - key: LANDMINE_SOURCE
        value: auto
      - key: LANDMINE_ENABLE_EVENTS
        value: "1"
      # Safety cap: largest universe a single /universe request will screen.
      - key: LANDMINE_MAX_UNIVERSE
        value: "250"
      - key: PYTHON_VERSION
        value: "3.11.9"

  # Remote MCP server (streamable HTTP) with OAuth. Add its /mcp URL as a custom
  # connector in Claude.ai; the connector runs the OAuth flow and the owner
  # approves with LANDMINE_MCP_OAUTH_PASSWORD on the /login page.
  - type: web
    name: landmine-mcp
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: "pip install -e '.[mcp]'"
    startCommand: "uvicorn landmine_mcp.web:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      # Base URL of the API service above. Defaults to its predicted public URL;
      # adjust if Render assigned a different hostname.
      - key: LANDMINE_API_URL
        value: https://landmine-screen.onrender.com
      # Pull the API service's generated key so the two stay in sync.
      - key: LANDMINE_API_KEY
        fromService:
          type: web
          name: landmine-screen
          envVarKey: API_KEY
      # --- OAuth (Claude.ai custom connectors) ---
      # Setting both of these turns on the OAuth authorization server; the
      # connector then authenticates via OAuth instead of a static token.
      # Public HTTPS base of THIS service (OAuth issuer + redirect base). Adjust
      # if Render assigned a different hostname.
      - key: LANDMINE_MCP_PUBLIC_URL
        value: https://landmine-mcp.onrender.com
      # Shared password the owner types on the /login consent page. Generated;
      # read it from the Render dashboard.
      - key: LANDMINE_MCP_OAUTH_PASSWORD
        generateValue: true
      # Legacy static-bearer mode for non-OAuth hosts. Ignored while OAuth (the
      # two vars above) is configured; kept for hosts that send a raw token.
      - key: LANDMINE_MCP_TOKEN
        generateValue: true
      # Optional strict Host allowlist (comma-separated; trailing ':*' wildcards
      # the port). Leave unset to disable the SDK's localhost-only DNS-rebinding
      # protection, which otherwise 421/403s every request to this public host.
      # If set, include this service's own hostname, e.g.:
      #   landmine-mcp.onrender.com
      - key: LANDMINE_MCP_ALLOWED_HOSTS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
